<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="src/main.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/tmt.webp" type="image/icon"/>
    <title>TMT Docs</title>
  </head>
  <body>
  <div id="topbar">
    <img src="assets/tmt.webp" alt="TMT Logo" width="64" height="64"/>
    <b style="margin-left: 1rem; font-size: 1.2rem">TMT Wiki</b>
    <button id="mobileMenuShow">▾</button>
  </div>

  <div id="mobileMenu">
    <div id="mobileMenuHeader">
      <img src="assets/tmt.webp" alt="TMT Logo" width="64" height="64"/>
      <b style="margin-left: 1rem; font-size: 1.2rem">TMT Wiki</b>
      <button id="mobileMenuHide">×</button>
    </div>
    <div id="mobileMenuPages"></div>
  </div>

  <div id="docContainer">
    <div id="sidebar"></div>
    <div id="page"></div>
    <div id="contents"></div>
  </div>
  </body>
</html>
